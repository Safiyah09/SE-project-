<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In / Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<div class="overlay-bg"></div> <!-- FIXED background overlay -->
<div class="container" id="container">

  <!-- Sign Up -->
  <div class="form-container sign-up-container">
    <form>
      <h1>Create Account</h1>
      <input type="text" placeholder="Name" id="name1"/>
      <input type="email" placeholder="Email" id="email1"/>
      <input type="password" placeholder="Password" id="pwd"/>
      <button onclick="validate()">Sign Up</button>
    </form>
  </div>

  <!-- Sign In -->
  <div class="form-container sign-in-container">
    <form>
      <h1>Sign in</h1>
      <input type="email" placeholder="Email" id="email2" />
      <input type="password" placeholder="Password" id="pwd2" />
      <button onclick="valid2()">Sign In</button>
    </form>
  </div>

  <!-- Overlay -->
  <div class="overlay-container">
    <div class="overlay">
      
      <div class="overlay-panel overlay-left">
        <h1>Welcome Back!</h1>
        <p>To keep connected with us please login</p>
        <button class="ghost" id="signIn">Sign In</button>
      </div>

      <div class="overlay-panel overlay-right">
        <h1>Hello, Friend!</h1>
        <p>Enter your details and start journey with us</p>
        <button class="ghost" id="signUp">Sign Up</button>
      </div>

    </div>
  </div>

</div>



<script src="script.js"></script>
</body>
</html>
